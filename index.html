<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#2A7B88">
<title>火鍋計時器</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍲</text></svg>">
<style>
/* ===== RESET & VARIABLES ===== */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --pri:#2A7B88;
  --sec:#E07B5E;--sec-l:#F09B7E;
  --amb:#EAC76D;
  --bg:#FDF6EB;--txt:#2C3338;--txt-l:#8A8279;
  --card:#fff;
  --sh:0 2px 8px rgba(44,51,56,.08);
  --sh-lg:0 4px 16px rgba(44,51,56,.12);
  --r:14px;--r-s:10px;
  /* group colors */
  --g-protein:#E07B5E;
  --g-greens:#5B9A6F;
  --g-carbs:#C49A2A;
}
html{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue","PingFang TC","Microsoft JhengHei",sans-serif;
  background:var(--bg);color:var(--txt);
  min-height:100%;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ===== HEADER ===== */
.header{
  height:52px;display:flex;align-items:center;justify-content:center;
  background:var(--pri);color:#fff;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 8px rgba(42,123,136,.3);
}
.header h1{font-size:22px;font-weight:800;letter-spacing:3px}

/* ===== SEARCH ===== */
.search-wrap{
  position:sticky;top:52px;z-index:99;
  background:var(--bg);padding:10px 16px 6px;
}
.search-inner{position:relative}
.search-input{
  width:100%;padding:10px 40px 10px 38px;
  border:2px solid #DDD5CA;border-radius:24px;
  font-size:15px;background:#fff;color:var(--txt);
  outline:none;transition:border-color .2s;
}
.search-input:focus{border-color:var(--pri)}
.search-input::placeholder{color:#B8B0A4}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.search-clear{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  width:26px;height:26px;border:none;background:#DDD5CA;color:#fff;
  border-radius:50%;font-size:13px;cursor:pointer;
  display:none;align-items:center;justify-content:center;
}
.search-clear.show{display:flex}

/* ===== CATEGORY TABS ===== */
.cat-tabs{
  display:flex;overflow-x:auto;gap:8px;
  padding:10px 16px 8px;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{
  flex-shrink:0;padding:7px 15px;border-radius:20px;
  border:2px solid var(--tc, var(--pri));
  background:transparent;
  color:var(--tc, var(--pri));
  font-size:13px;font-weight:700;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.cat-tab.active{background:var(--tc, var(--pri));color:#fff}

/* ===== GROUP HEADER ===== */
.grp-header{
  display:flex;align-items:center;gap:8px;
  padding:18px 4px 4px;
  font-size:13px;font-weight:800;
  color:var(--gc);letter-spacing:2px;
}
.grp-dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--gc);flex-shrink:0;
}
.grp-line{
  flex:1;height:1px;
  background:var(--gc);opacity:.25;
}

/* ===== INGREDIENT GRID ===== */
.sections{padding:0 12px 220px}
.sec-title{
  font-size:16px;font-weight:800;color:var(--gc, var(--pri));
  padding:10px 4px 6px;border-bottom:2px solid var(--gc, var(--pri));
  margin-bottom:10px;display:flex;align-items:center;gap:6px;
}
.sec-title span{font-size:18px}
.grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:10px;margin-bottom:16px;
}
@media(min-width:420px){.grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:600px){.grid{grid-template-columns:repeat(5,1fr)}}
@media(min-width:800px){.grid{grid-template-columns:repeat(6,1fr)}}

.i-card{
  background:#fff;border-radius:var(--r-s);
  padding:14px 6px 10px;text-align:center;
  box-shadow:var(--sh);cursor:pointer;
  transition:transform .12s,border-color .2s;
  border:2px solid transparent;user-select:none;
}
.i-card:active{transform:scale(.94)}
.i-card.has-timer{border-color:var(--sec-l);background:#FFF7F4}
.i-card .i-name{font-size:15px;font-weight:700;line-height:1.3}
.i-card .i-alias{font-size:11px;color:var(--txt-l);margin-top:1px}
.i-card .i-time{font-size:13px;color:var(--sec);font-weight:700;margin-top:4px}
.i-card .i-go{
  display:inline-block;margin-top:6px;padding:3px 14px;
  background:var(--pri);color:#fff;border-radius:12px;
  font-size:12px;font-weight:700;
}
.i-card.has-timer .i-go{background:var(--sec)}

/* ===== NO RESULTS ===== */
.no-res{text-align:center;padding:60px 20px;color:var(--txt-l);font-size:16px;display:none}
.no-res.show{display:block}
.no-res .nr-e{font-size:48px;display:block;margin-bottom:12px}

/* ===== BOTTOM TIMER PANEL ===== */
.tp{
  position:fixed;bottom:0;left:0;right:0;
  background:#fff;
  border-radius:20px 20px 0 0;
  box-shadow:0 -4px 20px rgba(44,51,56,.12);
  z-index:200;
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  padding-bottom:env(safe-area-inset-bottom,0);
}
.tp.show{transform:translateY(0)}
.tp-handle{
  width:36px;height:4px;background:#DDD5CA;
  border-radius:2px;margin:10px auto 6px;
}
.tp-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px 8px;
}
.tp-head-left{font-size:15px;font-weight:700;color:var(--sec);display:flex;align-items:center;gap:6px}
.tp-count{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:22px;height:22px;background:var(--sec);color:#fff;
  border-radius:11px;font-size:12px;font-weight:800;padding:0 6px;
}
.tp-clear{
  background:none;border:none;color:var(--txt-l);
  font-size:13px;cursor:pointer;padding:4px 8px;
}
.tp-scroll{
  display:flex;gap:12px;overflow-x:auto;
  padding:0 16px 14px;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.tp-scroll::-webkit-scrollbar{display:none}

/* ===== TIMER CARD ===== */
.tc{
  flex-shrink:0;width:108px;
  background:var(--bg);border-radius:var(--r);
  padding:10px 6px 10px;text-align:center;
  border:2px solid transparent;
  transition:border-color .3s,background .3s;
}
.tc.done{
  border-color:var(--amb);
  animation:alertPulse .7s ease-in-out infinite alternate;
}
.tc.paused{border-color:var(--txt-l);opacity:.85}
@keyframes alertPulse{
  from{background:#FFF8E8}to{background:#FFECB3}
}
.tc svg{display:block;margin:0 auto}
.tc .bg-ring{fill:none;stroke:#E8E2D8;stroke-width:4}
.tc .fg-ring{
  fill:none;stroke:var(--sec);stroke-width:4;stroke-linecap:round;
  transform:rotate(-90deg);transform-origin:center;
  transition:stroke-dashoffset .3s linear;
}
.tc.done .fg-ring{stroke:var(--amb)}
.tc.paused .fg-ring{stroke:var(--txt-l)}
.tc .t-num{
  fill:var(--txt);font-size:16px;font-weight:800;
  text-anchor:middle;dominant-baseline:central;
}
.tc.done .t-num{fill:var(--sec);font-size:20px}
.tc .t-name{
  font-size:12px;font-weight:700;margin-top:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.tc .t-btns{display:flex;justify-content:center;gap:6px;margin-top:6px}
.t-btn{
  width:30px;height:30px;border-radius:50%;border:none;
  font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.t-btn-pp{background:var(--pri);color:#fff}
.t-btn-pp.is-p{background:var(--amb);color:#fff}
.t-btn-rst{background:#EDE8E2;color:var(--txt-l)}
.t-btn-rm{background:#EDE8E2;color:#C0B8AE;font-size:15px}
.t-btn-ok{
  background:var(--amb);color:#fff;border:none;border-radius:14px;
  padding:5px 18px;font-size:13px;font-weight:700;cursor:pointer;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .25s ease-out}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header"><h1>🍲 火鍋計時器</h1></div>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-inner">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" placeholder="搜尋食材..." id="searchInput" autocomplete="off">
    <button class="search-clear" id="searchClear">✕</button>
  </div>
</div>

<!-- CATEGORY TABS -->
<div class="cat-tabs" id="catTabs"></div>

<!-- INGREDIENT SECTIONS -->
<div class="sections" id="sections"></div>
<div class="no-res" id="noRes"><span class="nr-e">🤔</span>找不到相關食材</div>

<!-- BOTTOM TIMER PANEL -->
<div class="tp" id="timerPanel">
  <div class="tp-handle"></div>
  <div class="tp-head">
    <div class="tp-head-left">⏱ 計時中 <span class="tp-count" id="tCount">0</span></div>
    <button class="tp-clear" id="clearAllBtn">全部清除</button>
  </div>
  <div class="tp-scroll" id="tScroll"></div>
</div>

<script>
/* =============================================================
   DATA
============================================================= */
const GROUPS = [
  {id:'protein', label:'蛋白質', color:'#E07B5E'},
  {id:'greens',  label:'蔬菜',   color:'#5B9A6F'},
  {id:'carbs',   label:'碳水',   color:'#C49A2A'},
];

const DATA = [
  // ── 蛋白質 ──
  {id:'beef', emoji:'🥩', label:'牛肉', group:'protein', items:[
    {name:'吊龍',alias:'上腦',time:10},
    {name:'五花趾',alias:'腱子肉',time:20},
    {name:'匙柄',alias:'肩胛肉',time:10},
    {name:'匙仁',alias:'嫩肩',time:8},
    {name:'胸口油',alias:'牛胸肉',time:40},
    {name:'肥牛片',time:15},
    {name:'牛舌',time:20},
    {name:'牛百葉',time:15},
    {name:'牛毛肚',time:15},
  ]},
  {id:'meat', emoji:'🍗', label:'其他肉類', group:'protein', items:[
    {name:'豬肉片',time:30},
    {name:'雞肉',time:300},
  ]},
  {id:'seafood', emoji:'🦐', label:'海鮮', group:'protein', items:[
    {name:'蝦',time:120},
    {name:'魚片',time:15},
    {name:'蛤蜊',time:180},
    {name:'鮮魷魚',time:30},
    {name:'鮮鮑魚',time:60},
    {name:'蟹棒',time:30},
    {name:'蝦滑',time:120},
  ]},
  {id:'balls', emoji:'🧆', label:'雜丸', group:'protein', items:[
    {name:'牛肉丸',time:180},
    {name:'牛筋丸',time:180},
    {name:'墨魚丸',time:180},
    {name:'貢丸',time:180},
    {name:'午餐肉',time:60},
    {name:'鴨血',time:120},
  ]},
  // ── 蔬菜 ──
  {id:'vegetables', emoji:'🥬', label:'蔬菜', group:'greens', items:[
    {name:'皇帝菜',alias:'茼蒿',time:15},
    {name:'蓮藕片',time:60},
    {name:'土豆片',time:60},
    {name:'生菜',time:10},
    {name:'冬瓜',time:120},
    {name:'玉米',time:300},
    {name:'西洋菜',time:15},
    {name:'香芋',time:180},
    {name:'西藍花',time:90},
    {name:'娃娃菜',time:30},
    {name:'油麥菜',time:15},
    {name:'白蘿卜',time:180},
  ]},
  {id:'mushroom', emoji:'🍄', label:'菌菇', group:'greens', items:[
    {name:'金針菇',time:30},
    {name:'香菇',time:180},
    {name:'杏鮑菇',time:120},
    {name:'木耳',time:30},
    {name:'平菇',time:30},
    {name:'茶樹菇',time:180},
  ]},
  {id:'tofu', emoji:'🫘', label:'豆製品', group:'greens', items:[
    {name:'腐竹',time:120},
    {name:'豆皮',time:30},
    {name:'油豆腐',time:120},
  ]},
  // ── 碳水 ──
  {id:'staple', emoji:'🍜', label:'主食', group:'carbs', items:[
    {name:'粉絲',time:120},
    {name:'烏冬麵',time:180},
    {name:'年糕',time:120},
    {name:'紅薯粉',time:60},
    {name:'方便麵',time:180},
    {name:'河粉',time:30},
    {name:'蛋餃',time:120},
  ]},
];

function groupOf(cat){ return GROUPS.find(g=>g.id===cat.group); }

/* =============================================================
   STATE
============================================================= */
let selCat = 'all';
let query = '';
let timers = [];
let tIdSeq = 0;

/* =============================================================
   AUDIO & VIBRATION
============================================================= */
let actx = null;
function ensureAudio(){
  if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume();
}
document.addEventListener('touchstart', ensureAudio, {once:true});
document.addEventListener('click', ensureAudio, {once:true});

function playAlarm(){
  ensureAudio();
  if(!actx) return;
  const now = actx.currentTime;
  function tone(f,s,d,v){
    const o=actx.createOscillator(), g=actx.createGain();
    o.connect(g); g.connect(actx.destination);
    o.type='sine'; o.frequency.value=f;
    g.gain.setValueAtTime(v,s);
    g.gain.exponentialRampToValueAtTime(0.001,s+d);
    o.start(s); o.stop(s+d);
  }
  for(let i=0;i<3;i++){
    const t=now+i*0.42;
    tone(880,t,0.12,0.45);
    tone(1100,t+0.12,0.12,0.45);
    tone(1320,t+0.24,0.2,0.38);
  }
}
function vibrate(){
  if(navigator.vibrate) navigator.vibrate([250,80,250,80,250]);
}

/* =============================================================
   TIMER LOGIC
============================================================= */
const CIRC = 2 * Math.PI * 22;

function addTimer(catId, itemName){
  const cat = DATA.find(c=>c.id===catId);
  const item = cat.items.find(i=>i.name===itemName);
  if(!item) return;
  timers.push({
    id: ++tIdSeq,
    name: item.name,
    totalMs: item.time * 1000,
    endTime: Date.now() + item.time * 1000,
    pausedRem: null,
    paused: false,
    done: false,
  });
  renderTimerPanel();
  renderIngredients();
}

function remMs(t){
  if(t.done) return 0;
  if(t.paused) return t.pausedRem;
  return Math.max(0, t.endTime - Date.now());
}
function remSec(t){ return Math.ceil(remMs(t)/1000); }
function progress(t){ return remMs(t)/t.totalMs; }

function togglePause(id){
  const t=timers.find(x=>x.id===id);
  if(!t||t.done) return;
  if(t.paused){
    t.endTime = Date.now() + t.pausedRem;
    t.pausedRem = null; t.paused = false;
  } else {
    t.pausedRem = Math.max(0, t.endTime - Date.now());
    t.paused = true;
  }
  renderTimerPanel();
}

function resetTimer(id){
  const t=timers.find(x=>x.id===id);
  if(!t) return;
  t.endTime = Date.now() + t.totalMs;
  t.pausedRem = null; t.paused = false; t.done = false;
  renderTimerPanel();
}

function removeTimer(id){
  timers = timers.filter(x=>x.id!==id);
  renderTimerPanel();
  renderIngredients();
}

function clearAllTimers(){
  timers = [];
  renderTimerPanel();
  renderIngredients();
}

setInterval(()=>{
  if(timers.length===0) return;
  let changed = false;
  timers.forEach(t=>{
    if(t.done||t.paused) return;
    if(remMs(t)<=0 && !t.done){
      t.done = true;
      playAlarm();
      vibrate();
    }
    changed = true;
  });
  if(changed) renderTimerPanel();
}, 250);

/* =============================================================
   RENDER: TIMER PANEL
============================================================= */
function renderTimerPanel(){
  const panel = document.getElementById('timerPanel');
  const scroll = document.getElementById('tScroll');
  const countEl = document.getElementById('tCount');

  if(timers.length===0){ panel.classList.remove('show'); return; }
  panel.classList.add('show');
  countEl.textContent = timers.length;

  const sorted = [...timers].sort((a,b)=>{
    if(a.done&&!b.done) return -1;
    if(!a.done&&b.done) return 1;
    return remMs(a)-remMs(b);
  });

  scroll.innerHTML = sorted.map(t=>{
    const sec = remSec(t);
    const p = progress(t);
    const off = CIRC * (1 - p);
    const cls = t.done?'done':t.paused?'paused':'';
    const display = t.done ? '!' : sec;

    let btns;
    if(t.done){
      btns = `<button class="t-btn-ok" onclick="removeTimer(${t.id})">確認</button>`;
    } else {
      btns = `
        <button class="t-btn t-btn-pp ${t.paused?'is-p':''}" onclick="togglePause(${t.id})">${t.paused?'▶':'⏸'}</button>
        <button class="t-btn t-btn-rst" onclick="resetTimer(${t.id})">↻</button>
        <button class="t-btn t-btn-rm" onclick="removeTimer(${t.id})">✕</button>`;
    }
    return `
      <div class="tc ${cls}">
        <svg width="56" height="56" viewBox="0 0 52 52">
          <circle class="bg-ring" cx="26" cy="26" r="22"/>
          <circle class="fg-ring" cx="26" cy="26" r="22"
            stroke-dasharray="${CIRC}" stroke-dashoffset="${off}"/>
          <text class="t-num" x="26" y="26">${display}</text>
        </svg>
        <div class="t-name">${t.name}</div>
        <div class="t-btns">${btns}</div>
      </div>`;
  }).join('');
}

/* =============================================================
   RENDER: CATEGORY TABS
============================================================= */
function renderCatTabs(){
  const el = document.getElementById('catTabs');
  let h = `<button class="cat-tab ${selCat==='all'?'active':''}" onclick="selectCat('all')" style="--tc:var(--pri)">全部</button>`;
  DATA.forEach(c=>{
    const grp = groupOf(c);
    h += `<button class="cat-tab ${selCat===c.id?'active':''}" onclick="selectCat('${c.id}')" style="--tc:${grp.color}">${c.emoji} ${c.label}</button>`;
  });
  el.innerHTML = h;
}

function selectCat(id){
  selCat = id;
  query = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('show');
  renderCatTabs();
  renderIngredients();
}

/* =============================================================
   RENDER: INGREDIENTS
============================================================= */
function getTimerNames(){
  const s = new Set();
  timers.forEach(t=>s.add(t.name));
  return s;
}

function renderIngredients(){
  const container = document.getElementById('sections');
  const noRes = document.getElementById('noRes');
  const timerNames = getTimerNames();
  const q = query.trim().toLowerCase();
  const searching = q.length > 0;
  const showAll = searching || selCat === 'all';
  let hasResults = false;
  let html = '';
  let lastGroupId = '';

  DATA.forEach(cat=>{
    if(!searching && selCat!=='all' && cat.id!==selCat) return;

    let items = cat.items;
    if(searching){
      items = items.filter(it=>
        it.name.toLowerCase().includes(q) ||
        (it.alias && it.alias.toLowerCase().includes(q))
      );
    }
    if(items.length===0) return;
    hasResults = true;

    // Group header (only in "全部" or search view)
    if(showAll && cat.group !== lastGroupId){
      const grp = groupOf(cat);
      html += `<div class="grp-header" style="--gc:${grp.color}">
        <span class="grp-dot"></span>${grp.label}<span class="grp-line"></span>
      </div>`;
      lastGroupId = cat.group;
    }

    // Section title
    const grp = groupOf(cat);
    if(showAll){
      html += `<div class="sec-title" style="--gc:${grp.color}"><span>${cat.emoji}</span>${cat.label}</div>`;
    }

    html += '<div class="grid">';
    items.forEach(it=>{
      const active = timerNames.has(it.name);
      html += `
        <div class="i-card ${active?'has-timer':''} fade-up"
             onclick="addTimer('${cat.id}','${it.name}')">
          <div class="i-name">${it.name}</div>
          ${it.alias ? `<div class="i-alias">${it.alias}</div>` : ''}
          <div class="i-time">${it.time}秒</div>
          <div class="i-go">${active?'再加一個':'開始'}</div>
        </div>`;
    });
    html += '</div>';
  });

  container.innerHTML = html;
  noRes.classList.toggle('show', !hasResults);
}

/* =============================================================
   SEARCH
============================================================= */
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');

searchInput.addEventListener('input', ()=>{
  query = searchInput.value;
  searchClear.classList.toggle('show', query.length>0);
  renderIngredients();
});

searchClear.addEventListener('click', ()=>{
  query = '';
  searchInput.value = '';
  searchClear.classList.remove('show');
  renderIngredients();
  searchInput.focus();
});

renderCatTabs();
renderIngredients();
